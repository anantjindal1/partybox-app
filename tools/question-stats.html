<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📊 Question Stats — PartyBox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111113;
      color: #e4e4e7;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      padding: 24px 16px 48px;
    }

    h1 { font-size: 1.6rem; font-weight: 900; }
    .subtitle { color: #71717a; font-size: 0.85rem; margin-top: 4px; }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      cursor: pointer;
      border: none;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 10px;
      padding: 8px 16px;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:active { opacity: 0.7; }

    .btn-refresh { background: #f59e0b; color: #1c1917; }
    .btn-export  { background: #27272a; color: #e4e4e7; border: 1px solid #3f3f46; }

    /* Summary row */
    .summary {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .summary-card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 12px;
      padding: 12px 18px;
      flex: 1 1 120px;
      text-align: center;
    }
    .summary-card .val { font-size: 1.5rem; font-weight: 900; color: #fff; }
    .summary-card .lbl { font-size: 0.75rem; color: #71717a; margin-top: 2px; }

    /* Filter bar */
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
      align-items: center;
    }
    .filter-btn {
      background: #27272a;
      color: #a1a1aa;
      border: 1px solid #3f3f46;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
    }
    .filter-btn.active {
      background: #f59e0b;
      color: #1c1917;
      border-color: transparent;
    }

    select {
      background: #27272a;
      color: #e4e4e7;
      border: 1px solid #3f3f46;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #27272a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: #18181b;
      color: #71717a;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 10px 12px;
      text-align: left;
      white-space: nowrap;
    }

    tbody tr {
      border-top: 1px solid #27272a;
    }
    tbody tr:hover { background: rgba(255,255,255,0.03); }

    td {
      padding: 10px 12px;
      vertical-align: middle;
    }

    .row-hot    { background: #4a1010; }
    .row-warm   { background: #4a3a10; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .pill-hot  { background: #7f1d1d; color: #fca5a5; }
    .pill-warm { background: #78350f; color: #fcd34d; }
    .pill-ok   { background: #27272a; color: #a1a1aa; }

    .count-badge {
      font-size: 1.1rem;
      font-weight: 900;
      min-width: 2rem;
      display: inline-block;
      text-align: center;
    }

    .cat-tag {
      background: #1e293b;
      color: #94a3b8;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .timestamp { color: #52525b; font-size: 0.75rem; white-space: nowrap; }
    .q-text { max-width: 340px; }

    .last-updated { color: #52525b; font-size: 0.78rem; margin-top: 6px; }

    .empty { color: #52525b; text-align: center; padding: 48px 0; }

    .loading { color: #71717a; text-align: center; padding: 48px 0; }

    .error-msg { color: #f87171; font-size: 0.85rem; margin-bottom: 12px; }

    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📊 Question Stats</h1>
    <div class="subtitle">Tracks how often each question has been shown across all games</div>
    <div class="last-updated" id="lastUpdated">—</div>
  </div>
  <div class="header-actions">
    <button class="btn-export" onclick="exportCSV()">⬇️ Export CSV</button>
    <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<div class="summary">
  <div class="summary-card"><div class="val" id="totalCount">—</div><div class="lbl">Total Tracked</div></div>
  <div class="summary-card"><div class="val" id="shown5">—</div><div class="lbl">Shown 5+ times</div></div>
  <div class="summary-card"><div class="val" id="shown3">—</div><div class="lbl">Shown 3-4 times</div></div>
  <div class="summary-card"><div class="val" id="shown1">—</div><div class="lbl">Shown 1-2 times</div></div>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all"     onclick="setFilter('all')">All</button>
  <button class="filter-btn"        data-filter="5plus"   onclick="setFilter('5plus')">5+ times</button>
  <button class="filter-btn"        data-filter="3to4"    onclick="setFilter('3to4')">3-4 times</button>
  <button class="filter-btn"        data-filter="1to2"    onclick="setFilter('1to2')">1-2 times</button>

  <select id="catFilter" onchange="renderTable()">
    <option value="">All Categories</option>
  </select>
</div>

<div id="errorMsg" class="error-msg" style="display:none"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Times Shown</th>
        <th>Question</th>
        <th>Category</th>
        <th>Last Seen</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="5" class="loading">Loading…</td></tr>
    </tbody>
  </table>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────────
  // NOTE: The Firestore REST API requires the collection to allow public reads.
  // If reads are restricted, you will see a 403 error below.
  const PROJECT_ID = 'partybox-cd9ab'
  const BASE_URL   = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents`

  let allRows = []
  let currentFilter = 'all'

  // ── Fetch ────────────────────────────────────────────────────────────────────
  async function loadData() {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="loading">Loading…</td></tr>'
    document.getElementById('errorMsg').style.display = 'none'

    try {
      const url = `${BASE_URL}/question_stats?pageSize=300`
      const res = await fetch(url)
      if (!res.ok) {
        const body = await res.text()
        throw new Error(`HTTP ${res.status}: ${body.substring(0, 200)}`)
      }
      const data = await res.json()
      const docs = data.documents ?? []

      allRows = docs.map(d => {
        const f = d.fields ?? {}
        return {
          id:       d.name.split('/').pop(),
          question: f.question?.stringValue ?? '—',
          category: f.category?.stringValue ?? '—',
          count:    parseInt(f.count?.integerValue ?? f.count?.doubleValue ?? 0, 10),
          lastSeen: f.lastSeen?.timestampValue ?? null,
          source:   f.source?.stringValue ?? '—',
        }
      }).sort((a, b) => b.count - a.count)

      updateSummary()
      populateCategoryFilter()
      renderTable()
      document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString()
    } catch (err) {
      console.error(err)
      const el = document.getElementById('errorMsg')
      el.textContent = '⚠️ ' + err.message
      el.style.display = 'block'
      document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="empty">Failed to load data.</td></tr>'
    }
  }

  // ── Summary ──────────────────────────────────────────────────────────────────
  function updateSummary() {
    document.getElementById('totalCount').textContent = allRows.length
    document.getElementById('shown5').textContent     = allRows.filter(r => r.count >= 5).length
    document.getElementById('shown3').textContent     = allRows.filter(r => r.count >= 3 && r.count <= 4).length
    document.getElementById('shown1').textContent     = allRows.filter(r => r.count <= 2).length
  }

  // ── Category filter ──────────────────────────────────────────────────────────
  function populateCategoryFilter() {
    const cats = [...new Set(allRows.map(r => r.category))].sort()
    const sel = document.getElementById('catFilter')
    sel.innerHTML = '<option value="">All Categories</option>'
    cats.forEach(c => {
      const opt = document.createElement('option')
      opt.value = c
      opt.textContent = c
      sel.appendChild(opt)
    })
  }

  function setFilter(f) {
    currentFilter = f
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === f)
    })
    renderTable()
  }

  // ── Render ───────────────────────────────────────────────────────────────────
  function renderTable() {
    const catFilter = document.getElementById('catFilter').value
    let rows = allRows

    if (catFilter) rows = rows.filter(r => r.category === catFilter)

    if (currentFilter === '5plus') rows = rows.filter(r => r.count >= 5)
    else if (currentFilter === '3to4') rows = rows.filter(r => r.count >= 3 && r.count <= 4)
    else if (currentFilter === '1to2') rows = rows.filter(r => r.count <= 2)

    if (rows.length === 0) {
      document.getElementById('tbody').innerHTML = '<tr><td colspan="5" class="empty">No questions match this filter.</td></tr>'
      return
    }

    const html = rows.map((r, i) => {
      const rowClass = r.count >= 5 ? 'row-hot' : r.count >= 3 ? 'row-warm' : ''
      const pillClass = r.count >= 5 ? 'pill-hot' : r.count >= 3 ? 'pill-warm' : 'pill-ok'
      const ts = r.lastSeen ? new Date(r.lastSeen).toLocaleDateString('en-IN', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—'
      return `
        <tr class="${rowClass}">
          <td style="color:#52525b;font-size:0.75rem">${i + 1}</td>
          <td>
            <span class="count-badge ${r.count >= 5 ? 'text-red-400' : r.count >= 3 ? 'text-amber-400' : ''}" style="color:${r.count >= 5 ? '#fca5a5' : r.count >= 3 ? '#fcd34d' : '#a1a1aa'}">${r.count}</span>
            <span class="pill ${pillClass}" style="margin-left:6px">${r.count >= 5 ? '🔴 Hot' : r.count >= 3 ? '🟡 Warm' : '⚪ OK'}</span>
          </td>
          <td class="q-text">${escHtml(r.question)}</td>
          <td><span class="cat-tag">${escHtml(r.category)}</span></td>
          <td class="timestamp">${ts}</td>
        </tr>`
    }).join('')

    document.getElementById('tbody').innerHTML = html
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }

  // ── Export CSV ───────────────────────────────────────────────────────────────
  function exportCSV() {
    if (!allRows.length) { alert('No data to export.'); return }
    const header = ['question', 'category', 'count', 'lastSeen', 'source']
    const lines = [
      header.join(','),
      ...allRows.map(r => [
        `"${r.question.replace(/"/g, '""')}"`,
        r.category,
        r.count,
        r.lastSeen ? new Date(r.lastSeen).toISOString() : '',
        r.source,
      ].join(','))
    ]
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    const date = new Date().toISOString().substring(0, 10)
    a.download = `question-stats-${date}.csv`
    a.click()
    URL.revokeObjectURL(url)
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  loadData()
</script>
</body>
</html>
