<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Editor — PartyBox</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3249;
  --text: #e2e8f0;
  --text-muted: #8892a4;
  --green: #22c55e;
  --accent: #4f6ef7;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; }

#app { display: flex; height: 100vh; }

/* ── SIDEBAR ── */
#sidebar {
  width: 280px;
  min-width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
  overflow-y: auto;
}

#stats {
  background: var(--surface2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: var(--text-muted);
  line-height: 2;
  flex-shrink: 0;
}
#stats span { color: var(--text); font-weight: 700; }

.filter-section { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }

select, input[type=text] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 7px 10px;
  font-size: 13px;
  outline: none;
}
select:focus, input[type=text]:focus { border-color: var(--accent); }

.radio-group { display: flex; gap: 6px; }
.radio-group label {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 4px;
  cursor: pointer;
  font-size: 12px;
  user-select: none;
  transition: border-color 0.15s, color 0.15s;
}
.radio-group input[type=radio] { display: none; }
.radio-group label:has(input:checked) { border-color: var(--accent); color: #818cf8; }

.btn {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  transition: opacity 0.15s;
  flex-shrink: 0;
}
.btn:hover { opacity: 0.85; }
.btn-save   { background: var(--green); color: #fff; }
.btn-export { background: var(--surface2); border: 1px solid var(--border); color: var(--text); }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

#toolbar {
  padding: 11px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  color: var(--text-muted);
  flex-shrink: 0;
}
#toolbar strong { color: var(--text); }

/* ── VIRTUAL SCROLL ── */
#scroll-outer {
  flex: 1;
  overflow-y: auto;
  position: relative;
  padding: 12px 20px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#scroll-inner { position: relative; width: 100%; }

/* ── CARDS ── */
.q-card {
  position: absolute;
  left: 0;
  right: 0;
  height: 172px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  transition: opacity 0.2s, border-color 0.15s;
}
.q-card:hover { border-color: #3e4669; }
.q-card.disabled-card { opacity: 0.4; }

.card-header { display: flex; align-items: center; gap: 7px; flex-shrink: 0; height: 22px; }
.q-num { margin-left: auto; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; }

.cb { width: 15px; height: 15px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }

/* Pills */
.pill {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}
.pill-gk        { background: #1d3461; color: #93c5fd; }
.pill-bollywood  { background: #4a1a35; color: #f9a8d4; }
.pill-cricket    { background: #14402a; color: #86efac; }
.pill-science    { background: #0c3345; color: #67e8f9; }
.pill-food       { background: #3d2010; color: #fdba74; }
.pill-brain      { background: #2e1a4a; color: #d8b4fe; }
.pill-random     { background: #1f2937; color: #9ca3af; }
.pill-easy       { background: #14402a; color: #86efac; }
.pill-medium     { background: #3d2a00; color: #fcd34d; }
.pill-hard       { background: #3d1a1a; color: #fca5a5; }

.card-question {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.4;
  flex-shrink: 0;
  height: 36px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}

.card-options {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 10px;
  flex-shrink: 0;
  height: 36px;
}
.opt {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11.5px;
  color: var(--text-muted);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  height: 17px;
}
.opt.correct { color: var(--green); font-weight: 600; }
.opt-circle {
  width: 11px;
  height: 11px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.opt.correct .opt-circle::after {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
}

.card-explanation {
  font-size: 11px;
  font-style: italic;
  color: var(--text-muted);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex-shrink: 0;
  height: 16px;
}

.card-footer { display: flex; gap: 8px; margin-top: auto; flex-shrink: 0; }
.card-footer select { flex: 1; padding: 4px 6px; font-size: 11px; border-radius: 5px; }

/* ── OPEN SCREEN ── */
#open-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 14px;
  color: var(--text-muted);
}
#open-screen .icon { font-size: 48px; }
#open-screen h1 { font-size: 20px; color: var(--text); font-weight: 700; }
.btn-open {
  background: var(--accent);
  color: #fff;
  padding: 13px 32px;
  border-radius: 10px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 6px;
}
.btn-open:hover { background: #3d5aed; }
#open-screen small { font-size: 12px; opacity: 0.7; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--green);
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
  z-index: 999;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar" style="display:none">
    <div id="stats">Loading…</div>

    <div class="filter-section">
      <div class="filter-label">Category</div>
      <select id="f-cat">
        <option value="">All Categories</option>
        <option value="gk">GK</option>
        <option value="bollywood">Bollywood</option>
        <option value="cricket">Cricket</option>
        <option value="science">Science</option>
        <option value="food">Food</option>
        <option value="brain">Brain</option>
        <option value="random">Random</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">Difficulty</div>
      <select id="f-diff">
        <option value="">All Difficulties</option>
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div class="filter-section">
      <div class="filter-label">Status</div>
      <div class="radio-group">
        <label><input type="radio" name="f-status" value="all" checked> All</label>
        <label><input type="radio" name="f-status" value="active"> Active</label>
        <label><input type="radio" name="f-status" value="disabled"> Disabled</label>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Search</div>
      <input type="text" id="f-search" placeholder="Filter by question text…">
    </div>

    <button class="btn btn-save"   id="btn-save">Save JSON</button>
    <button class="btn btn-export" id="btn-export">Export Active Only</button>
  </aside>

  <!-- MAIN -->
  <main id="main">
    <!-- Open screen -->
    <div id="open-screen">
      <div class="icon">&#x1F4CB;</div>
      <h1>Question Editor</h1>
      <div>Open <code>src/data/questions.json</code> to get started</div>
      <button class="btn-open" id="btn-open">Open questions.json</button>
      <small>Uses File System Access API — Chrome / Edge only</small>
    </div>

    <!-- Editor UI (hidden until file loaded) -->
    <div id="editor-ui" style="display:none; flex-direction:column; height:100%">
      <div id="toolbar">
        Showing <strong id="showing-count">0</strong> of <strong id="total-count">0</strong> questions
      </div>
      <div id="scroll-outer">
        <div id="scroll-inner"></div>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const CARD_HEIGHT = 172
const CARD_GAP    = 8
const CARD_STRIDE = CARD_HEIGHT + CARD_GAP
const BUFFER      = 10
const CATEGORIES  = ['gk','bollywood','cricket','science','food','brain','random']
const DIFFICULTIES= ['easy','medium','hard']

// ── State ─────────────────────────────────────────────────────────────────────
let allQuestions    = []
let filteredIndices = []
let fileHandle      = null

// ── DOM refs ──────────────────────────────────────────────────────────────────
const sidebar      = document.getElementById('sidebar')
const openScreen   = document.getElementById('open-screen')
const editorUI     = document.getElementById('editor-ui')
const scrollOuter  = document.getElementById('scroll-outer')
const scrollInner  = document.getElementById('scroll-inner')
const statsEl      = document.getElementById('stats')
const showingCount = document.getElementById('showing-count')
const totalCount   = document.getElementById('total-count')
const toast        = document.getElementById('toast')
const fCat         = document.getElementById('f-cat')
const fDiff        = document.getElementById('f-diff')
const fSearch      = document.getElementById('f-search')

const fStatus = () => document.querySelector('input[name="f-status"]:checked').value

// ── Open file ─────────────────────────────────────────────────────────────────
document.getElementById('btn-open').onclick = async () => {
  try {
    ;[fileHandle] = await window.showOpenFilePicker({
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
    })
    const file = await fileHandle.getFile()
    const text = await file.text()
    allQuestions = JSON.parse(text)
    initEditor()
  } catch (e) {
    if (e.name !== 'AbortError') alert('Error opening file: ' + e.message)
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
function initEditor() {
  openScreen.style.display = 'none'
  sidebar.style.display    = 'flex'
  editorUI.style.display   = 'flex'

  updateStats()
  applyFilters()
  scrollOuter.addEventListener('scroll', renderVisible, { passive: true })
  window.addEventListener('resize', renderVisible, { passive: true })
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const total    = allQuestions.length
  const disabled = allQuestions.filter(q => q.disabled).length
  const active   = total - disabled
  statsEl.innerHTML =
    `Total: <span>${total}</span><br>` +
    `Active: <span>${active}</span><br>` +
    `Disabled: <span>${disabled}</span>`
  totalCount.textContent = total
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const cat    = fCat.value
  const diff   = fDiff.value
  const status = fStatus()
  const search = fSearch.value.trim().toLowerCase()

  filteredIndices = []
  for (let i = 0; i < allQuestions.length; i++) {
    const q = allQuestions[i]
    if (cat    && q.category   !== cat)  continue
    if (diff   && q.difficulty !== diff) continue
    if (status === 'active'   &&  q.disabled) continue
    if (status === 'disabled' && !q.disabled) continue
    if (search && !q.question.toLowerCase().includes(search)) continue
    filteredIndices.push(i)
  }

  showingCount.textContent = filteredIndices.length
  scrollOuter.scrollTop = 0
  clearCards()
  scrollInner.style.height = (filteredIndices.length * CARD_STRIDE) + 'px'
  renderVisible()
}

// ── Virtual scroll ────────────────────────────────────────────────────────────
const cardEls = new Map() // filteredIndex -> DOM el

function clearCards() {
  scrollInner.innerHTML = ''
  cardEls.clear()
}

function renderVisible() {
  const scrollTop = scrollOuter.scrollTop
  const viewH     = scrollOuter.clientHeight
  const startFi   = Math.max(0, Math.floor(scrollTop / CARD_STRIDE) - BUFFER)
  const endFi     = Math.min(filteredIndices.length - 1, Math.ceil((scrollTop + viewH) / CARD_STRIDE) + BUFFER)

  // Remove cards scrolled out of range
  for (const [fi, el] of cardEls) {
    if (fi < startFi || fi > endFi) {
      el.remove()
      cardEls.delete(fi)
    }
  }

  // Add cards now in range
  for (let fi = startFi; fi <= endFi; fi++) {
    if (!cardEls.has(fi)) {
      const qi = filteredIndices[fi]
      const el = buildCard(qi)
      el.style.top = (fi * CARD_STRIDE) + 'px'
      scrollInner.appendChild(el)
      cardEls.set(fi, el)
    }
  }
}

// ── Build card ────────────────────────────────────────────────────────────────
function buildCard(qi) {
  const q  = allQuestions[qi]
  const el = document.createElement('div')
  el.className = 'q-card' + (q.disabled ? ' disabled-card' : '')

  // --- Header ---
  const header = document.createElement('div')
  header.className = 'card-header'

  const cb = document.createElement('input')
  cb.type    = 'checkbox'
  cb.className = 'cb'
  cb.checked = !q.disabled
  cb.title   = 'Enable / disable this question'
  cb.onchange = () => {
    allQuestions[qi].disabled = !cb.checked
    el.classList.toggle('disabled-card', !cb.checked)
    updateStats()
  }

  const catPill = pill(q.category || 'random', 'cat-pill')
  const difPill = pill(q.difficulty || 'medium', 'diff-pill')

  const num = document.createElement('span')
  num.className   = 'q-num'
  num.textContent = '#' + (qi + 1)

  header.append(cb, catPill, difPill, num)

  // --- Question text ---
  const qText = document.createElement('div')
  qText.className   = 'card-question'
  qText.textContent = q.question

  // --- Options 2×2 ---
  const optsEl = document.createElement('div')
  optsEl.className = 'card-options'
  ;(q.options || []).slice(0, 4).forEach(opt => {
    const isCorrect = opt === q.correctAnswer
    const row    = document.createElement('div')
    row.className = 'opt' + (isCorrect ? ' correct' : '')
    const circle = document.createElement('span')
    circle.className = 'opt-circle'
    const lbl = document.createElement('span')
    lbl.textContent = opt
    lbl.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap'
    row.append(circle, lbl)
    optsEl.appendChild(row)
  })

  // --- Explanation ---
  const expl = document.createElement('div')
  expl.className   = 'card-explanation'
  expl.textContent = q.explanation ? '\uD83D\uDCA1 ' + q.explanation : ''

  // --- Footer dropdowns ---
  const footer = document.createElement('div')
  footer.className = 'card-footer'

  const catSel = makeSelect(CATEGORIES, q.category, val => {
    allQuestions[qi].category = val
    catPill.className   = 'pill pill-' + val
    catPill.textContent = val
  })

  const difSel = makeSelect(DIFFICULTIES, q.difficulty, val => {
    allQuestions[qi].difficulty = val
    difPill.className   = 'pill pill-' + val
    difPill.textContent = val
  })

  footer.append(catSel, difSel)
  el.append(header, qText, expl, optsEl, footer)
  return el
}

function pill(value, role) {
  const el = document.createElement('span')
  el.className   = 'pill pill-' + (value || 'random')
  el.textContent = value || 'random'
  el.dataset.role = role
  return el
}

function makeSelect(options, current, onChange) {
  const sel = document.createElement('select')
  options.forEach(v => {
    const o = document.createElement('option')
    o.value    = v
    o.textContent = v.charAt(0).toUpperCase() + v.slice(1)
    if (v === current) o.selected = true
    sel.appendChild(o)
  })
  sel.onchange = () => onChange(sel.value)
  return sel
}

// ── Save / Export ─────────────────────────────────────────────────────────────
document.getElementById('btn-save').onclick = () => saveJSON(allQuestions, null)

document.getElementById('btn-export').onclick = () => {
  const active = allQuestions.filter(q => !q.disabled)
  const date   = new Date().toISOString().slice(0, 10).replace(/-/g, '')
  saveJSON(active, 'questions_active_' + date + '.json')
}

async function saveJSON(data, filename) {
  try {
    const json = JSON.stringify(data, null, 2)
    if (filename) {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
      })
      const w = await handle.createWritable()
      await w.write(json)
      await w.close()
      showToast('Exported!')
    } else {
      const w = await fileHandle.createWritable()
      await w.write(json)
      await w.close()
      showToast('Saved!')
    }
  } catch (e) {
    if (e.name !== 'AbortError') alert('Save failed: ' + e.message)
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer = null
function showToast(msg) {
  toast.textContent = msg
  toast.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2000)
}

// ── Filter listeners ──────────────────────────────────────────────────────────
fCat.addEventListener('change', applyFilters)
fDiff.addEventListener('change', applyFilters)
fSearch.addEventListener('input', applyFilters)
document.querySelectorAll('input[name="f-status"]')
  .forEach(r => r.addEventListener('change', applyFilters))
</script>
</body>
</html>
